version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rpos-postgres
    environment:
      POSTGRES_USER: rpos
      POSTGRES_PASSWORD: rpos_dev_password
      POSTGRES_DB: rpos
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rpos']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rpos-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rpos-api
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://rpos:rpos_dev_password@postgres:5432/rpos
      - DIRECT_URL=postgresql://rpos:rpos_dev_password@postgres:5432/rpos
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rpos-web
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
